services:
  huisu-sync-api:
    build: .
    container_name: huisu-sync-api
    restart: unless-stopped
    environment:
      SYNC_API_TOKEN: ${SYNC_API_TOKEN:-lee123456}
      SYNC_DB_PATH: ${SYNC_DB_PATH:-/data/sync.db}
      SYNC_MAX_BODY_BYTES: ${SYNC_MAX_BODY_BYTES:-10485760}
      SYNC_HISTORY_LIMIT: ${SYNC_HISTORY_LIMIT:-30}
    ports:
      - "18080:8080"
    volumes:
      - huisu_sync_data:/data

volumes:
  huisu_sync_data:
